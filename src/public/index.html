<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Server</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-dim: #1f4e8c;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --radius: 6px;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

    header { padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: .3px; }
    header span { font-size: 12px; color: var(--text-muted); }

    .layout { flex: 1; display: flex; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar { width: 280px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 12px; border-bottom: 1px solid var(--border); }
    .sidebar-header button { width: 100%; padding: 8px 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; }
    .sidebar-header button:hover { background: #79b8ff; }

    #task-list { flex: 1; overflow-y: auto; }
    .task-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .12s; }
    .task-item:hover { background: rgba(255,255,255,.04); }
    .task-item.active { background: var(--accent-dim); }
    .task-item .prompt { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-item .meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: flex; gap: 6px; align-items: center; }
    .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
    .badge-running  { background: #1a3a5c; color: var(--accent); }
    .badge-pending  { background: #2d2a1a; color: var(--yellow); }
    .badge-completed{ background: #1a3a25; color: var(--green); }
    .badge-failed   { background: #3a1a1a; color: var(--red); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .toolbar { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; font-size: 13px; color: var(--text-muted); }
    #task-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #cancel-btn { padding: 4px 10px; background: transparent; border: 1px solid var(--red); color: var(--red); border-radius: var(--radius); font-size: 12px; cursor: pointer; display: none; }
    #cancel-btn:hover { background: rgba(248,81,73,.1); }

    #terminal-wrap { flex: 1; overflow: hidden; padding: 6px; background: #0d1117; }

    /* ── Input bar ── */
    #input-bar { display: none; padding: 8px 10px; background: var(--surface); border-top: 1px solid var(--border); gap: 8px; align-items: center; flex-shrink: 0; }
    #input-bar.visible { display: flex; }
    #task-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none; }
    #task-input:focus { border-color: var(--accent); }
    #input-send { padding: 7px 14px; background: var(--accent); border: none; color: #fff; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    #input-send:hover { background: #79b8ff; }

    /* ── Modal ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .overlay.hidden { display: none; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 520px; max-width: 95vw; display: flex; flex-direction: column; gap: 16px; }
    .modal h2 { font-size: 16px; }
    label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 4px; }
    input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none; }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 100px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .btn-cancel { padding: 8px 16px; background: transparent; border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); cursor: pointer; font-size: 13px; }
    .btn-submit { padding: 8px 16px; background: var(--accent); border: none; color: #fff; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 14px; flex-direction: column; gap: 8px; }
  </style>
</head>
<body>

<header>
  <h1>Claude Code Server</h1>
  <span id="header-status">●</span>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <button id="new-task-btn">+ New Task</button>
    </div>
    <div id="task-list"></div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <span id="task-title">Select or create a task</span>
      <button id="cancel-btn">Cancel</button>
    </div>
    <div id="terminal-wrap">
      <div id="terminal-placeholder" class="empty-state">
        <div>No task selected</div>
        <div style="font-size:12px">Create a new task or select one from the sidebar</div>
      </div>
      <div id="terminal" style="display:none; height:100%;"></div>
    </div>
    <div id="input-bar">
      <input id="task-input" type="text" placeholder="Send input to the running agent…" autocomplete="off" />
      <button id="input-send">Send</button>
    </div>
  </main>
</div>

<!-- New Task Modal -->
<div class="overlay hidden" id="modal-overlay">
  <div class="modal">
    <h2>New Task</h2>
    <div>
      <label for="f-prompt">Prompt *</label>
      <textarea id="f-prompt" placeholder="Describe what you want Claude Code to do…"></textarea>
    </div>
    <div>
      <label for="f-repo">GitHub repo (optional)</label>
      <input id="f-repo" type="text" placeholder="owner/repo  or  https://github.com/owner/repo" />
    </div>
    <div>
      <label for="f-branch">Branch (optional)</label>
      <input id="f-branch" type="text" placeholder="main" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-submit" id="modal-submit">Run</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script>
(() => {
  const WS_BASE = location.origin.replace(/^http/, 'ws');
  const API = '/api/tasks';

  let activeTaskId = null;
  let term = null;
  let fitAddon = null;
  let activeWs = null;

  // ── Terminal init ──────────────────────────────────────────────────────────
  function initTerminal() {
    if (term) return;
    term = new Terminal({
      theme: { background: '#0d1117', foreground: '#e6edf3', cursor: '#e6edf3' },
      fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
      fontSize: 13,
      lineHeight: 1.4,
      scrollback: 10000,
      convertEol: true,
    });
    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();
  }

  window.addEventListener('resize', () => fitAddon && fitAddon.fit());

  // ── Task list ──────────────────────────────────────────────────────────────
  async function loadTasks() {
    const tasks = await fetch(API).then(r => r.json()).catch(() => []);
    renderTaskList(tasks);
  }

  function renderTaskList(tasks) {
    const el = document.getElementById('task-list');
    if (!tasks.length) {
      el.innerHTML = '<div style="padding:16px;font-size:13px;color:var(--text-muted)">No tasks yet.</div>';
      return;
    }
    el.innerHTML = tasks.map(t => `
      <div class="task-item${t.id === activeTaskId ? ' active' : ''}" data-id="${t.id}">
        <div class="prompt">${escHtml(t.prompt)}</div>
        <div class="meta">
          <span class="badge badge-${t.status}">${t.status}</span>
          <span>${fmtDate(t.createdAt)}</span>
          ${t.repo ? `<span>📁 ${escHtml(t.repo)}</span>` : ''}
        </div>
      </div>
    `).join('');
    el.querySelectorAll('.task-item').forEach(el => {
      el.addEventListener('click', () => openTask(el.dataset.id));
    });
  }

  // ── Open / subscribe to a task ─────────────────────────────────────────────
  async function openTask(id) {
    if (activeTaskId === id) return;
    activeTaskId = id;

    // Close old WS
    if (activeWs) { activeWs.close(); activeWs = null; }

    // Show terminal
    document.getElementById('terminal-placeholder').style.display = 'none';
    document.getElementById('terminal').style.display = 'block';
    initTerminal();
    term.clear();

    await loadTasks(); // re-render sidebar selection

    // Get task meta
    const task = await fetch(`${API}/${id}`).then(r => r.json()).catch(() => null);
    if (!task) return;
    updateToolbar(task);

    // Subscribe via WebSocket
    const ws = new WebSocket(`${WS_BASE}?taskId=${id}`);
    activeWs = ws;
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        handleEvent(msg, id);
      } catch {}
    };
  }

  function handleEvent(msg, taskId) {
    if (msg.type === 'output' || msg.type === 'stderr' || msg.type === 'system') {
      term && term.write(msg.text);
    }
    if (msg.type === 'status') {
      updateToolbarStatus(msg.status);
      loadTasks(); // refresh badge in sidebar
    }
  }

  function updateToolbar(task) {
    document.getElementById('task-title').textContent = task.prompt;
    updateToolbarStatus(task.status);
  }

  function updateToolbarStatus(status) {
    const running = status === 'running';

    const btn = document.getElementById('cancel-btn');
    btn.style.display = running ? 'block' : 'none';
    btn.onclick = () => {
      if (!activeTaskId) return;
      fetch(`${API}/${activeTaskId}`, { method: 'DELETE' });
    };

    const bar = document.getElementById('input-bar');
    const input = document.getElementById('task-input');
    running ? bar.classList.add('visible') : bar.classList.remove('visible');
    if (running) input.focus();
  }

  function sendInput() {
    const input = document.getElementById('task-input');
    const text = input.value;
    if (!text || !activeWs || activeWs.readyState !== 1) return;
    activeWs.send(JSON.stringify({ type: 'input', text }));
    // Echo what was sent into the terminal so the user can see it
    if (term) term.write(`\r\n> ${text}\r\n`);
    input.value = '';
  }

  document.getElementById('input-send').addEventListener('click', sendInput);
  document.getElementById('task-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); sendInput(); }
  });

  // ── Modal ──────────────────────────────────────────────────────────────────
  document.getElementById('new-task-btn').addEventListener('click', () => {
    document.getElementById('modal-overlay').classList.remove('hidden');
    document.getElementById('f-prompt').focus();
  });

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  document.getElementById('modal-submit').addEventListener('click', submitTask);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      if (!document.getElementById('modal-overlay').classList.contains('hidden')) submitTask();
    }
  });

  function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    document.getElementById('f-prompt').value = '';
    document.getElementById('f-repo').value = '';
    document.getElementById('f-branch').value = '';
    document.getElementById('modal-submit').disabled = false;
  }

  async function submitTask() {
    const prompt = document.getElementById('f-prompt').value.trim();
    if (!prompt) { document.getElementById('f-prompt').focus(); return; }

    const body = {
      prompt,
      repo: document.getElementById('f-repo').value.trim() || undefined,
      branch: document.getElementById('f-branch').value.trim() || undefined,
    };

    document.getElementById('modal-submit').disabled = true;

    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      alert('Failed to create task');
      document.getElementById('modal-submit').disabled = false;
      return;
    }

    const { id } = await res.json();
    closeModal();
    await loadTasks();
    openTask(id);
  }

  // ── Polling for sidebar refresh ────────────────────────────────────────────
  setInterval(loadTasks, 5000);
  loadTasks();

  // ── Helpers ────────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(iso) {
    return new Date(iso).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  }
})();
</script>
</body>
</html>
