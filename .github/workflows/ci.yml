name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t claude-code-server:ci .

      - name: Start container
        run: |
          docker run -d \
            --name claude-test \
            -p 3000:3000 \
            claude-code-server:ci

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/tasks > /dev/null; then
              echo "Server is up"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready in time"
          docker logs claude-test
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run smoke tests
        run: node --test tests/smoke.mjs

      - name: Print container logs on failure
        if: failure()
        run: docker logs claude-test

      - name: Stop container
        if: always()
        run: docker rm -f claude-test
