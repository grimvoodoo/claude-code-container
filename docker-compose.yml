services:
  # PostgreSQL — used by both local dev (cargo run) and deployed app
  db:
    image: docker.io/postgres:16-alpine
    container_name: claude-container-db
    env_file:
      - .env
    environment:
      - POSTGRES_USER=claude
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - POSTGRES_DB=claude_container
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude -d claude_container"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  default:
    name: claude-container-network
